version: '3.4'

services:
  new-api:
    image: sinowhalex/swapi:${DEPLOY_VERSION}
    container_name: swapi-new-api
    restart: always
    command: --log-dir /app/logs
    ports:
      - "3088:3000"
    volumes:
      - ./data:/data
      - ./logs:/app/logs
    environment:
      - SQL_DSN=postgresql://swapi:${POSTGRES_PASSWORD}@swapi-postgres:5432/new-api
      - REDIS_CONN_STRING=redis://:${REDIS_PASSWORD}@swapi-redis:6379
      - TZ=Asia/Shanghai
      - ERROR_LOG_ENABLED=true
      - BATCH_UPDATE_ENABLED=true
      - NODE_NAME=swapi-node-1
      - SESSION_SECRET=${SESSION_SECRET}
      - SWX_HEADER_ENABLED=${SWX_HEADER_ENABLED:-true}
      - SWX_HEADER_STRICT=${SWX_HEADER_STRICT:-false}
      - SWX_HEADER_LOG_QUERY_ROLE=${SWX_HEADER_LOG_QUERY_ROLE:-admin}
    depends_on:
      swapi-redis:
        condition: service_healthy
      swapi-postgres:
        condition: service_healthy
    networks:
      - swapi-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/api/status | grep -o '\"success\":\\s*true' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: 'json-file'
      options:
        max-size: '50m'
        max-file: '5'

  swapi-redis:
    image: redis:7-alpine
    container_name: swapi-redis
    restart: always
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - swapi-redis-data:/data
    networks:
      - swapi-network
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  swapi-postgres:
    image: postgres:15
    container_name: swapi-postgres
    restart: always
    environment:
      POSTGRES_USER: swapi
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: new-api
    volumes:
      - swapi-pg-data:/var/lib/postgresql/data
    networks:
      - swapi-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U swapi -d new-api']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  swapi-pg-data:
  swapi-redis-data:

networks:
  swapi-network:
    driver: bridge
