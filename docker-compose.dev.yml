# SinoWhale-api 本地开发环境（方案C 联调）
#
# 使用方式：
#   启动:  docker-compose -f docker-compose.dev.yml up -d
#   停止:  docker-compose -f docker-compose.dev.yml down
#   重建:  docker-compose -f docker-compose.dev.yml up -d --build
#   日志:  docker-compose -f docker-compose.dev.yml logs -f new-api
#
# 注意：本文件仅用于本地开发，不要部署到生产环境。
#       生产部署请走 docker push/pull + 远端 compose 流程。

services:
  postgres:
    image: postgres:15
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: '123456'
      POSTGRES_DB: new-api
      TZ: Asia/Shanghai
    volumes:
      - sinowhale-api_pg_data:/var/lib/postgresql/data
    networks:
      - new-api-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U root -d new-api']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:latest
    container_name: redis
    restart: unless-stopped
    command: redis-server --requirepass 123456
    networks:
      - new-api-network
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '123456', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  new-api:
    image: new-api-plan-c
    container_name: new-api
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '3088:3000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SQL_DSN: 'postgresql://root:123456@postgres:5432/new-api'
      REDIS_CONN_STRING: 'redis://:123456@redis:6379'
      # SWX 方案C 集成开关
      SWX_HEADER_ENABLED: 'true'
      SWX_HEADER_STRICT: 'false'
      SWX_HEADER_LOG_QUERY_ROLE: 'admin'
      # 通用
      TZ: 'Asia/Shanghai'
      ERROR_LOG_ENABLED: 'true'
      BATCH_UPDATE_ENABLED: 'true'
      NODE_NAME: 'new-api-node-1'
      SESSION_SECRET: 'b718992e19283710f82b6d9dfbdf7cc3aed80b5cc4080546a353167a17d17169'  # 固定 Session 密钥，防止重启后登录失效
    volumes:
      - ./data:/data
      - ./logs:/app/logs
    networks:
      - new-api-network

volumes:
  sinowhale-api_pg_data:

networks:
  new-api-network:
    name: sinowhale-api_new-api-network
